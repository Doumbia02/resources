<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Smart GreenHouse</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f4f0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .error-container {
        text-align: center;
        padding: 40px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 4rem;
        margin: 0;
      }
      p {
        color: #666;
        margin: 20px 0;
      }
      a {
        color: #2d6a4f;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <h1>🌱</h1>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist.</p>
      <a href="index.html">← Back to Dashboard</a>
    </div>
  </body>
</html>
